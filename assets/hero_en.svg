<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="1" stop-color="#131a3a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#60a5fa" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1200" height="340" rx="24" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="340" rx="24" fill="url(#dots)"/>
  <circle cx="1040" cy="80" r="260" fill="url(#glow)"/>

  <!-- accent bar -->
  <rect x="70" y="92" width="6" height="156" rx="3" fill="url(#acc)"/>

  <!-- eyebrow -->
  <text x="96" y="108" fill="#60a5fa" font-size="15" font-weight="600" letter-spacing="5">SENIOR SOFTWARE ENGINEER</text>
  <!-- name -->
  <text x="94" y="170" fill="#eef2ff" font-size="56" font-weight="800" letter-spacing="0.5">Luis Alberto G&#243;mez Ruiz</text>
  <!-- tagline -->
  <text x="96" y="208" fill="#94a3b8" font-size="20">Backend &#183; APIs &#183; Frontend &#183; AI Integrations</text>

  <!-- chips -->
  <g>
    <rect x="96" y="232" width="190" height="34" rx="17" fill="#0d1230" stroke="#1e2a52"/>
    <circle cx="116" cy="249" r="4" fill="#60a5fa"/>
    <text x="130" y="254" fill="#eef2ff" font-size="14" font-weight="600">5+ years of experience</text>

    <rect x="300" y="232" width="270" height="34" rx="17" fill="#0d1230" stroke="#1e2a52"/>
    <circle cx="320" cy="249" r="4" fill="#22c55e"/>
    <text x="334" y="254" fill="#eef2ff" font-size="14" font-weight="600">Available for freelance</text>
  </g>

  <!-- location -->
  <text x="96" y="298" fill="#5a7bd4" font-size="14" letter-spacing="2">&#9679;  Cali &#183; Colombia</text>

  <!-- monogram -->
  <g transform="translate(1015,170)">
    <circle r="92" fill="none" stroke="#1e2a52" stroke-width="1.5"/>
    <circle r="74" fill="none" stroke="url(#acc)" stroke-width="3"/>
    <circle r="74" fill="#0d1230" fill-opacity="0.5"/>
    <text x="0" y="22" text-anchor="middle" fill="#eef2ff" font-size="58" font-weight="800" letter-spacing="2">LG</text>
  </g>
  <!-- orbit dots -->
  <circle cx="1015" cy="78" r="5" fill="#60a5fa"/>
  <circle cx="1107" cy="170" r="4" fill="#2563eb"/>
  <circle cx="1015" cy="262" r="3" fill="#60a5fa" fill-opacity="0.6"/>
</svg>
